<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Head -->
  <circle cx="63" cy="15" r="10" fill="#3b82f6"/>
  <!-- Torso -->
  <line x1="63" y1="25" x2="52" y2="54" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm (forward) -->
  <line x1="60" y1="36" x2="78" y2="48" stroke="#3b82f6" stroke-width="7" stroke-linecap="round"/>
  <!-- Left arm (back) -->
  <line x1="60" y1="36" x2="42" y2="28" stroke="#3b82f6" stroke-width="7" stroke-linecap="round"/>
  <!-- Right leg (forward/up) -->
  <line x1="52" y1="54" x2="68" y2="70" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <line x1="68" y1="70" x2="78" y2="60" stroke="#3b82f6" stroke-width="7" stroke-linecap="round"/>
  <!-- Left leg (back/down) -->
  <line x1="52" y1="54" x2="38" y2="72" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <line x1="38" y1="72" x2="28" y2="88" stroke="#3b82f6" stroke-width="7" stroke-linecap="round"/>
</svg>
