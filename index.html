<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0f1e" />
    <title>RunTrack</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- Auth overlay — shown until Firebase resolves session -->
    <div id="authOverlay" class="auth-overlay">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="favicon.svg" alt="RunTrack" width="40" height="40" />
          <span>RunTrack</span>
        </div>

        <!-- Login form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <h2 class="auth-title">Welcome back</h2>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="loginUsername" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="loginPassword" autocomplete="current-password" required />
          </div>
          <div id="loginError" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
          <p class="auth-switch">Don't have an account? <a href="#" onclick="toggleAuthMode()">Create one</a></p>
        </form>

        <!-- Register form -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
          <h2 class="auth-title">Create account</h2>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="registerUsername" autocomplete="username" required minlength="3" maxlength="24" pattern="[a-zA-Z0-9_]+" title="Letters, numbers and underscores only" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="registerPassword" autocomplete="new-password" required minlength="6" />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="registerConfirm" autocomplete="new-password" required minlength="6" />
          </div>
          <div id="registerError" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account</button>
          <p class="auth-switch">Already have an account? <a href="#" onclick="toggleAuthMode()">Sign in</a></p>
        </form>
      </div>
    </div>

    <!-- App shell (hidden until auth resolves) -->
    <div id="appShell" style="display:none; width:100%; display:none;">

      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h1 class="logo">RunTrack</h1>
          <div class="sidebar-header-btns">
            <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" onclick="toggleSidebarCollapse()">&#8249;</button>
            <button class="sidebar-toggle" onclick="toggleSidebar()">✕</button>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-tab="dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
          </button>
          <button class="nav-item" data-tab="schedule">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule
          </button>
          <button class="nav-item" data-tab="history">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
            History
          </button>
          <button class="nav-item" data-tab="plans">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Plans
          </button>
          <button class="nav-item" data-tab="ai">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.5V12l3 3-3 3v1.5c1.2.7 2 2 2 3.5a4 4 0 0 1-8 0c0-1.5.8-2.8 2-3.5V18l-3-3 3-3V9.5C8.8 8.8 8 7.5 8 6a4 4 0 0 1 4-4z"/></svg>
            AI Planner
          </button>
          <button class="nav-item" data-tab="devices">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
            Devices
          </button>
          <button class="nav-item" data-tab="settings">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M2 12h2M20 12h2M5.34 5.34l1.41 1.41M17.24 17.24l1.41 1.41M12 2v2M12 20v2"/></svg>
            Settings
          </button>
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" id="sidebarUser"></div>
          <button class="theme-toggle" onclick="toggleTheme()">Dark Mode</button>
        </div>
      </div>

      <div class="main-content">
        <header class="top-header">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <div class="header-info" id="headerInfo"></div>
          <div class="header-right">
            <span id="headerUsername" class="header-username"></span>
            <button class="btn-icon" onclick="logoutUser()" title="Sign out">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </header>

        <div class="container">
          <!-- Dashboard -->
          <div class="view active" id="dashboard">
            <div id="dashboardContent"></div>
          </div>

          <!-- Schedule -->
          <div class="view" id="schedule">
            <div class="view-header">
              <h2>Training Schedule</h2>
              <div class="view-actions">
                <button class="btn btn-secondary" onclick="showLogUnplannedModal()">Log Unplanned</button>
                <button class="btn btn-secondary" onclick="exportICS()">Export ICS</button>
              </div>
            </div>
            <div id="scheduleContent"></div>
          </div>

          <!-- History -->
          <div class="view" id="history">
            <div class="view-header">
              <h2>Run History</h2>
              <button class="btn btn-secondary" onclick="showLogUnplannedModal()">Log Run</button>
            </div>
            <div id="historyContent"></div>
          </div>

          <!-- Plans -->
          <div class="view" id="plans">
            <div class="view-header">
              <h2>Training Plans</h2>
              <button class="btn btn-primary" onclick="showCreatePlanModal()">+ New Plan</button>
            </div>
            <div id="plansContent"></div>
          </div>

          <!-- AI Planner -->
          <div class="view" id="ai">
            <div class="view-header">
              <h2>AI Planner</h2>
            </div>
            <div id="aiContent"></div>
          </div>

          <!-- Devices -->
          <div class="view" id="devices">
            <div class="view-header">
              <h2>Connect a Device</h2>
            </div>
            <div id="devicesContent"></div>
          </div>

          <!-- Settings -->
          <div class="view" id="settings">
            <div class="view-header">
              <h2>Settings</h2>
            </div>
            <div id="settingsContent"></div>
          </div>
        </div>
      </div>

    </div><!-- /appShell -->

    <!-- Log Run Modal -->
    <div class="modal" id="runLogModal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal('runLogModal')">✕</button>
        <h2 class="modal-title">Log Run</h2>
        <form onsubmit="saveRunLog(event)">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="logDate" required />
          </div>
          <div class="form-group">
            <label class="form-label">Planned: <span id="logPlanned" style="color:var(--accent);font-weight:700;"></span></label>
          </div>
          <div class="form-group">
            <label class="form-label">Distance (miles)</label>
            <input type="number" class="form-input" id="logDistance" step="0.1" min="0" required />
          </div>
          <div class="form-group">
            <label class="form-label">Time</label>
            <input type="text" class="form-input" id="logTime" placeholder="mm:ss or h:mm:ss" />
          </div>
          <div class="form-group">
            <label class="form-label">Perceived Effort (1–10)</label>
            <div class="effort-grid" id="effortGrid"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-input" id="logNotes" rows="3"></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal('runLogModal')">Cancel</button>
            <button type="button" class="btn btn-danger" id="deleteLogBtn" style="display:none" onclick="deleteCurrentLog()">Delete</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Adjustment Modal -->
    <div class="modal" id="adjustmentModal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal('adjustmentModal')">✕</button>
        <h2 class="modal-title">Redistribute Mileage?</h2>
        <p id="adjustmentMessage" style="color:var(--text2);margin-bottom:16px;"></p>
        <div id="adjustmentRuns" class="adjustment-runs"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('adjustmentModal')">Skip</button>
          <button type="button" class="btn btn-primary" onclick="applyAdjustment()">Apply</button>
        </div>
      </div>
    </div>

    <!-- Create/Edit Plan Modal -->
    <div class="modal" id="createPlanModal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal('createPlanModal')">✕</button>
        <h2 class="modal-title" id="createPlanTitle">New Plan</h2>
        <form onsubmit="savePlan(event)">
          <div class="form-group">
            <label class="form-label">Plan Name</label>
            <input type="text" class="form-input" id="planName" required />
          </div>
          <div class="form-group">
            <label class="form-label">Race Type</label>
            <select class="form-input" id="planRaceType" required>
              <option value="">Select…</option>
              <option value="5k">5K</option>
              <option value="10k">10K</option>
              <option value="half_marathon">Half Marathon</option>
              <option value="marathon">Marathon</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" class="form-input" id="planStartDate" required />
          </div>
          <div class="form-group">
            <label class="form-label">Race Date</label>
            <input type="date" class="form-input" id="planRaceDate" required />
          </div>
          <div class="form-group">
            <label class="form-label">Run Days</label>
            <div class="pill-group" id="runDaysPills"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Long Run Day</label>
            <select class="form-input" id="planLongRunDay" required>
              <option value="">Select…</option>
              <option value="monday">Monday</option>
              <option value="tuesday">Tuesday</option>
              <option value="wednesday">Wednesday</option>
              <option value="thursday">Thursday</option>
              <option value="friday">Friday</option>
              <option value="saturday">Saturday</option>
              <option value="sunday">Sunday</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal('createPlanModal')">Cancel</button>
            <button type="button" class="btn btn-danger" id="deletePlanBtn" style="display:none" onclick="deletePlan()">Delete</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="importModal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal('importModal')">✕</button>
        <h2 class="modal-title">Import Data</h2>
        <div class="form-group">
          <label class="form-label">Import Mode</label>
          <div class="pill-group">
            <div class="pill active" data-mode="merge" onclick="setImportMode(this)">Merge</div>
            <div class="pill" data-mode="replace" onclick="setImportMode(this)">Replace All</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">JSON File</label>
          <input type="file" class="form-input" id="importFile" accept=".json" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('importModal')">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="performImport()">Import</button>
        </div>
      </div>
    </div>

    <button class="fab" onclick="showLogUnplannedModal()">+</button>

    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-tab="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Schedule</span>
      </button>
      <button class="nav-item" data-tab="ai">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.5V12l3 3-3 3v1.5c1.2.7 2 2 2 3.5a4 4 0 0 1-8 0c0-1.5.8-2.8 2-3.5V18l-3-3 3-3V9.5C8.8 8.8 8 7.5 8 6a4 4 0 0 1 4-4z"/></svg>
        <span>AI</span>
      </button>
      <button class="nav-item" data-tab="devices">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        <span>Devices</span>
      </button>
      <button class="nav-item" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M2 12h2M20 12h2M5.34 5.34l1.41 1.41M17.24 17.24l1.41 1.41M12 2v2M12 20v2"/></svg>
        <span>Settings</span>
      </button>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
